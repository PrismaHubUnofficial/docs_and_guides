site_name: Robotics & Documentation Hub
site_description: Technical manuals and quick guides for robotic systems.
site_author: Simone

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

# Questa sezione mappa esattamente le tue cartelle
nav:
  - Home: index.md
  - General Quick Guides:
      - Creating Subtitles: General Quick Guide/QUICK GUIDE — Creating Subtitles.md
      - How to Update the Website: General Quick Guide/QUICK GUIDE — How to update the website.md
      - Voiceover for a Video: General Quick Guide/QUICK GUIDE — Voiceover for a Video.md
  - Robotic Platforms:
      - Legged:
        - ANYmal: robots/anymal/anymal_manual_operation.md
        - H1: robots/h1/h1_manual_operation.md
      - Aerial:
        - Dummy: robots/dummy/dummy_manual_operation.md
        - baby_k: robots/baby_k/baby_k_manual_operation.md
        - Leonardo: robots/leonardo/leonardo_manual_operation.md
      - Wheeled:
        - Rover: robots/rover/rover_manual_operation.md
        - fra2mo: robots/fra2mo/fra2mo_manual_operation.md
      - Manipulators:
        - Franka: robots/franka/franka_manual_operation.md
        - Armando: robots/armando/armando_manual_operation.md
        - Kuka: robots/kuka_iiwa/kuka_iiwa_manual_operation.md
      - Others:
        - Haption: robots/haption/haption_manual_operation.md
        - Falcon: robots/falcon/falcon_manual_operation.md
  - Resources:
      - LaTeX Symbols Guide: pdfs/latex_symbols_guide.pdf
      - Manual Template: robots/manual_operation_template.md

# Estensioni per rendere il sito professionale (tabelle, note, ecc.)
markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list # Necessario per ridimensionare immagini
